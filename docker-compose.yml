name: five-agent-dev-team

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_team
      POSTGRES_USER: agent_team
      POSTGRES_PASSWORD: agent_team
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_team -d agent_team"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: agent_team
      POSTGRES_PWD: agent_team
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "127.0.0.1:${TEMPORAL_PORT:-7233}:7233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 12

  controller:
    build: .
    restart: unless-stopped
    command: npm run dev:controller
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 4310
      DATABASE_URL: postgres://agent_team:agent_team@postgres:5432/agent_team
      TEMPORAL_ADDRESS: temporal:7233
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${DASHBOARD_PORT:-5173},http://127.0.0.1:${DASHBOARD_PORT:-5173}}
      AGENT_TEAM_PROJECT_CONFIG_DIR: ${AGENT_TEAM_PROJECT_CONFIG_DIR:-.agent-team/projects}
      TARGET_REPO_CONTAINER_PATH: ${TARGET_REPO_CONTAINER_PATH:-/workspace/target-repo}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      GITHUB_HOST: ${GITHUB_HOST:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_SCOPES: ${GITHUB_OAUTH_SCOPES:-repo workflow read:org}
      AGENT_TEAM_GITHUB_AUTH_FILE: ${AGENT_TEAM_GITHUB_AUTH_FILE:-.agent-team/github-auth.json}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    ports:
      - "127.0.0.1:${CONTROLLER_PORT:-4310}:4310"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - "${TARGET_REPO_HOST_PATH:-.}:${TARGET_REPO_CONTAINER_PATH:-/workspace/target-repo}"
      - "${GH_CONFIG_DIR:-gh-config}:/root/.config/gh"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4310/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: .
    restart: unless-stopped
    command: npm run dev:worker
    depends_on:
      controller:
        condition: service_healthy
      temporal:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://agent_team:agent_team@postgres:5432/agent_team
      TEMPORAL_ADDRESS: temporal:7233
      AGENT_TEAM_PROJECT_CONFIG_DIR: ${AGENT_TEAM_PROJECT_CONFIG_DIR:-.agent-team/projects}
      TARGET_REPO_CONTAINER_PATH: ${TARGET_REPO_CONTAINER_PATH:-/workspace/target-repo}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      GITHUB_HOST: ${GITHUB_HOST:-}
      AGENT_TEAM_GITHUB_AUTH_FILE: ${AGENT_TEAM_GITHUB_AUTH_FILE:-.agent-team/github-auth.json}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      WORKER_READY_FILE: /tmp/agent-team-worker-ready
      WORKER_READY_MAX_AGE_MS: 30000
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - "${TARGET_REPO_HOST_PATH:-.}:${TARGET_REPO_CONTAINER_PATH:-/workspace/target-repo}"
      - "${GH_CONFIG_DIR:-gh-config}:/root/.config/gh"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const fs=require('fs'); const file=process.env.WORKER_READY_FILE||'/tmp/agent-team-worker-ready'; const max=Number(process.env.WORKER_READY_MAX_AGE_MS||30000); const stat=fs.statSync(file); if(Date.now()-stat.mtimeMs>max) process.exit(1); const {Connection}=require('@temporalio/client'); Connection.connect({address:process.env.TEMPORAL_ADDRESS||'temporal:7233'}).then((connection)=>connection.close()).then(()=>process.exit(0)).catch(()=>process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 12

  dashboard:
    build: .
    restart: unless-stopped
    command: npm run dev:dashboard
    depends_on:
      controller:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DASHBOARD_PORT: 5173
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${CONTROLLER_PORT:-4310}}
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  node-modules:
  gh-config:
