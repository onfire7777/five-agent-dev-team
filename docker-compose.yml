name: five-agent-dev-team

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_team
      POSTGRES_USER: agent_team
      POSTGRES_PASSWORD: agent_team
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_team -d agent_team"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: agent_team
      POSTGRES_PWD: agent_team
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 12

  controller:
    build: .
    restart: unless-stopped
    command: npm run dev:controller
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://agent_team:agent_team@postgres:5432/agent_team
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "${CONTROLLER_PORT:-4310}:4310"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4310/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: .
    restart: unless-stopped
    command: npm run dev:worker
    depends_on:
      controller:
        condition: service_healthy
      temporal:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://agent_team:agent_team@postgres:5432/agent_team
      TEMPORAL_ADDRESS: temporal:7233
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/agent-team-worker-ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  dashboard:
    build: .
    restart: unless-stopped
    command: npm run dev:dashboard
    depends_on:
      controller:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_BASE_URL: http://localhost:4310
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  node-modules:
