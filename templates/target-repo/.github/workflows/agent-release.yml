name: Agent Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build --if-present
      - run: npm audit --audit-level=high
      - name: Project dependency audit policy
        run: |
          if npm run | grep -q "audit:security"; then
            npm run audit:security
          else
            echo "::notice::No audit:security script is defined; high-or-worse audit is the active dependency gate."
          fi

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create release notes
        run: |
          mkdir -p release
          git log -1 --pretty=%B > release/notes.md
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release/notes.md
