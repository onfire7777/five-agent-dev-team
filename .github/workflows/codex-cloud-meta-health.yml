name: Codex Cloud Meta Health

on:
  schedule:
    - cron: "57 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  checks: read
  contents: read
  issues: write
  pull-requests: read
  security-events: read
  statuses: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: codex-cloud-meta-health
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Reconcile GitHub control-plane truth
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          HAS_CODEX_HEALTH_TOKEN: ${{ secrets.CODEX_HEALTH_TOKEN != '' }}
        with:
          github-token: ${{ secrets.CODEX_HEALTH_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const now = new Date().toISOString();
            const blockers = [];
            const warnings = [];

            const branch = await github.rest.repos.getBranch({ owner, repo, branch: "main" });
            const mainSha = branch.data.commit.sha;

            let protection = null;
            try {
              protection = (await github.rest.repos.getBranchProtection({ owner, repo, branch: "main" })).data;
            } catch (error) {
              warnings.push({
                class: "advisory",
                title: "main branch protection is unavailable",
                detail: `Branch protection lookup failed: ${
                  error.status || "unknown"
                }; admin-read token access may be required for exact required-check reconciliation.`
              });
            }

            let workflowPermissions = null;
            try {
              workflowPermissions = (
                await github.request("GET /repos/{owner}/{repo}/actions/permissions/workflow", {
                  owner,
                  repo
                })
              ).data;
              if (workflowPermissions.can_approve_pull_request_reviews !== true) {
                blockers.push({
                  class: "globalStop",
                  title: "GitHub Actions PR publication policy is disabled",
                  detail:
                    "Codex Cloud Build Pipeline can generate and push branches, but PR publication can fail until repository Actions workflow permissions allow Actions-created or Actions-approved pull requests."
                });
              }
            } catch (error) {
              warnings.push({
                class: "advisory",
                title: "Actions workflow permission lookup unavailable",
                detail: `Workflow permission lookup failed: ${
                  error.status || "unknown"
                }; admin-read token access may be required to verify PR publication capability.`
              });
            }

            let buildWorkflowCanWritePullRequests = null;
            try {
              const buildWorkflow = await github.rest.repos.getContent({
                owner,
                repo,
                path: ".github/workflows/codex-cloud-build-pipeline.yml",
                ref: mainSha
              });
              const workflowBody = Buffer.from(buildWorkflow.data.content, "base64").toString("utf8");
              buildWorkflowCanWritePullRequests = /^\s*pull-requests:\s*write\s*$/m.test(workflowBody);
              if (!buildWorkflowCanWritePullRequests) {
                blockers.push({
                  class: "globalStop",
                  title: "Codex Cloud Build Pipeline lacks pull-request write scope",
                  detail:
                    "Codex Cloud Build Pipeline must declare pull-requests: write so its GITHUB_TOKEN can publish implementation PRs."
                });
              }
            } catch (error) {
              if (error.status === 404) {
                blockers.push({
                  class: "globalStop",
                  title: "Codex Cloud Build Pipeline workflow is missing",
                  detail:
                    "`.github/workflows/codex-cloud-build-pipeline.yml` was not found on the checked main revision, so PR publication cannot run."
                });
              } else {
                warnings.push({
                  class: "advisory",
                  title: "Codex Cloud Build Pipeline permission lookup unavailable",
                  detail: `Workflow file lookup failed: ${error.status || "unknown"}.`
                });
              }
            }

            const requiredContexts = [
              ...(protection?.required_status_checks?.contexts || []),
              ...(protection?.required_status_checks?.checks || []).map((check) => check.context)
            ].filter((contextName, index, contexts) => contextName && contexts.indexOf(contextName) === index);
            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner,
              repo,
              ref: mainSha,
              per_page: 100
            });
            const latestStatusByContext = new Map();
            for (const run of checkRuns) {
              setLatestStatus(latestStatusByContext, run.name, {
                kind: "check-run",
                status: run.status,
                conclusion: run.conclusion,
                observedAt: run.started_at || run.created_at
              });
            }

            const commitStatuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
              owner,
              repo,
              ref: mainSha,
              per_page: 100
            });
            for (const status of commitStatuses) {
              setLatestStatus(latestStatusByContext, status.context, {
                kind: "commit-status",
                status: "completed",
                conclusion: status.state,
                observedAt: status.updated_at || status.created_at
              });
            }

            function setLatestStatus(map, name, value) {
              const existing = map.get(name);
              if (!existing || new Date(value.observedAt) > new Date(existing.observedAt)) {
                map.set(name, value);
              }
            }

            const passingConclusions = new Set(["success", "neutral", "skipped"]);
            for (const contextName of requiredContexts) {
              const status = latestStatusByContext.get(contextName);
              if (!status) {
                blockers.push({
                  class: "globalStop",
                  title: `required check missing on main: ${contextName}`,
                  detail: `main ${mainSha} does not have a check run or commit status named ${contextName}.`
                });
                continue;
              }
              if (status.status !== "completed" || !passingConclusions.has(status.conclusion)) {
                blockers.push({
                  class: "globalStop",
                  title: `required check not green on main: ${contextName}`,
                  detail: `${status.kind} reported ${status.status}/${status.conclusion || "pending"} on ${mainSha}.`
                });
              }
            }

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const openIssuesRaw = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const openIssues = openIssuesRaw.filter((issue) => !issue.pull_request);
            const queueIssues = openIssues.filter((issue) =>
              issue.labels.some((label) =>
                ["agent:queued", "agent:claimed", "agent:running", "agent:merge-gate"].includes(label.name)
              )
            );
            const laneOrder = ["backend", "frontend", "quality", "security", "docs"];
            const issueField = (issue, name) =>
              (issue.body || "").match(new RegExp(`^${name}:\\s*(.+)$`, "im"))?.[1]?.toLowerCase() || "";
            const labelNamesFor = (issue) => issue.labels.map((label) => label.name);
            const inferIssueLane = (issue) => {
              const explicitLane = issueField(issue, "Lane assignment");
              if (laneOrder.includes(explicitLane)) return explicitLane;
              const expectedFiles = issueField(issue, "Expected files");
              if (
                expectedFiles.includes(".github/") ||
                expectedFiles.includes("dockerfile") ||
                expectedFiles.includes("docker-compose") ||
                expectedFiles.includes("package.json") ||
                expectedFiles.includes("package-lock.json") ||
                expectedFiles.includes("release/")
              ) {
                return "security";
              }
              if (
                expectedFiles.includes("apps/controller/") ||
                expectedFiles.includes("apps/worker/") ||
                expectedFiles.includes("packages/shared/") ||
                expectedFiles.includes("packages/github/")
              ) {
                return "backend";
              }
              if (expectedFiles.includes("apps/dashboard/")) return "frontend";
              if (expectedFiles.includes("tests/") || expectedFiles.includes("playwright.config")) return "quality";
              if (expectedFiles.includes("readme.md") || expectedFiles.includes("docs/")) return "docs";
              const labeledLane = labelNamesFor(issue)
                .find((label) => label.startsWith("lane:"))
                ?.slice("lane:".length);
              return laneOrder.includes(labeledLane) ? labeledLane : "";
            };
            const retryableBlockedIssues = openIssues
              .filter((issue) => /^QUEUE_ITEM_READY:\s*yes\s*$/im.test(issue.body || ""))
              .filter((issue) => {
                const labels = labelNamesFor(issue);
                return (
                  labels.includes("agent:blocked") &&
                  labels.includes("blocker:lane-stop") &&
                  labels.includes("execution:codex-cloud")
                );
              })
              .map((issue) => ({ issue, lane: inferIssueLane(issue) }))
              .filter((item) => laneOrder.includes(item.lane))
              .sort((a, b) => new Date(a.issue.created_at) - new Date(b.issue.created_at));

            if (!openPrs.length && !queueIssues.length && retryableBlockedIssues.length) {
              const { issue, lane } = retryableBlockedIssues[0];
              const labels = labelNamesFor(issue);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ["agent:queued", `lane:${lane}`]
              });
              for (const label of labels.filter(
                (name) =>
                  ["agent:blocked", "blocker:lane-stop", "agent:claimed", "agent:running"].includes(name) ||
                  (name.startsWith("lane:") && name !== `lane:${lane}`)
              )) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: label });
                } catch {}
              }
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Meta Health requeued this recoverable lane-stop item for the ${lane} lane because there are no open PRs and no active queued/running agent issues.\n\nRun: ${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`
              });
              warnings.push({
                class: "advisory",
                title: `requeued blocked queue issue #${issue.number}`,
                detail: `Issue #${issue.number} was returned to agent:queued for lane:${lane}.`
              });
            }

            let dependabotOpen = null;
            if (process.env.HAS_CODEX_HEALTH_TOKEN === "true") {
              try {
                const alerts = await github.request("GET /repos/{owner}/{repo}/dependabot/alerts", {
                  owner,
                  repo,
                  state: "open",
                  per_page: 100
                });
                dependabotOpen = alerts.data.length;
                if (dependabotOpen > 0) {
                  warnings.push({
                    class: "advisory",
                    title: "open Dependabot alerts",
                    detail: `${dependabotOpen} open alert(s) need Security/DevOps triage.`
                  });
                }
              } catch (error) {
                warnings.push({
                  class: "advisory",
                  title: "Dependabot alert lookup unavailable",
                  detail: `Dependabot lookup failed: ${error.status || "unknown"}.`
                });
              }
            } else {
              warnings.push({
                class: "advisory",
                title: "Dependabot alert lookup skipped",
                detail: "Configure CODEX_HEALTH_TOKEN with Dependabot-alert read access for exact alert reconciliation."
              });
            }

            const healthTitle = "[Codex Health] Cloud control-plane finding";
            const healthIssues = openIssues.filter((issue) => issue.title === healthTitle);
            const requiredLine = requiredContexts.length ? requiredContexts.join(", ") : "none reported";
            const summary = [
              "# Codex Cloud Meta Health",
              "",
              `Observed: ${now}`,
              `Repository: ${owner}/${repo}`,
              `main: ${mainSha}`,
              `Required checks: ${requiredLine}`,
              `Actions default token permission: ${workflowPermissions?.default_workflow_permissions || "unavailable"}`,
              `Actions PR policy enabled: ${
                workflowPermissions?.can_approve_pull_request_reviews === undefined
                  ? "unavailable"
                  : String(workflowPermissions.can_approve_pull_request_reviews)
              }`,
              `Cloud build declares pull-requests write: ${
                buildWorkflowCanWritePullRequests === null ? "unavailable" : String(buildWorkflowCanWritePullRequests)
              }`,
              `Open PRs: ${openPrs.length}`,
              `Open queued/running agent issues: ${queueIssues.length}`,
              `Retryable blocked lane-stop issues: ${retryableBlockedIssues.length}`,
              `Open Dependabot alerts: ${dependabotOpen === null ? "unavailable" : dependabotOpen}`,
              "",
              blockers.length
                ? `## Blockers\n${blockers.map((item) => `- ${item.class}: ${item.title} (${item.detail})`).join("\n")}`
                : "## Blockers\n- none",
              "",
              warnings.length
                ? `## Warnings\n${warnings.map((item) => `- ${item.class}: ${item.title} (${item.detail})`).join("\n")}`
                : "## Warnings\n- none",
              "",
              "## Routing",
              blockers.length
                ? "Meta Health has opened or refreshed the cloud health issue. Local build lanes should stay paused."
                : "GitHub control-plane truth is healthy. R&D may prepare the next scored queue issue when no active queue item exists."
            ].join("\n");

            await core.summary.addRaw(summary).write();

            if (!blockers.length) {
              for (const issue of healthIssues) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "closed",
                  state_reason: "completed"
                });
              }
              return;
            }

            const labels = ["agent:blocked", "blocker:global-stop"];
            if (healthIssues.length) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: healthIssues[0].number,
                body: summary,
                labels
              });
              for (const issue of healthIssues.slice(1)) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "closed",
                  state_reason: "not_planned"
                });
              }
              core.setFailed("Codex Cloud Meta Health found a global blocker.");
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title: healthTitle,
              body: summary,
              labels
            });

            core.setFailed("Codex Cloud Meta Health found a global blocker.");
