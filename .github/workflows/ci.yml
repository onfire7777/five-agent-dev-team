name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: High-severity dependency audit
        run: npm audit --audit-level=high
      - name: Moderate dependency audit report
        run: npm audit --audit-level=moderate || echo "::warning::Known moderate Temporal/uuid advisory is tracked in docs/security.md"
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
