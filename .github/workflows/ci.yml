name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: docker compose config --quiet
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Build and verify Docker runtime tools
        run: |
          docker build --build-arg GITHUB_MCP_VERSION=1.0.3 -t five-agent-dev-team:ci .
          docker run --rm five-agent-dev-team:ci sh -lc "gh --version && github-mcp-server --version"
      - name: High-severity dependency audit
        run: npm audit --audit-level=high
      - name: Moderate dependency audit report
        run: npm run audit:security
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
