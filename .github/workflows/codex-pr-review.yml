name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.state == 'open' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Fetch PR refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin "$PR_BASE_REF" "+refs/pull/$PR_NUMBER/head"
      - name: Run Codex review
        id: run_codex
        if: env.OPENAI_API_KEY != ''
        uses: openai/codex-action@a26d2d4d8b78a694338b8e3715c3630254340b2c
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          allow-users: onfire7777
          output-file: codex-output.md
          prompt: |
            This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.
            Review only the diff introduced by this PR.
            Focus on correctness, regressions, security, test gaps, workflow risk, and scope drift.
            Treat suggestions as advisory unless branch protection or unresolved review threads make them merge gates.

            Useful commands:
            git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
            git diff --stat ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
            git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Return concise findings first, with file paths and line references when possible.
      - name: Post Codex review
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
      - name: Upload Codex review output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: codex-pr-review
          path: codex-output.md
          if-no-files-found: ignore
